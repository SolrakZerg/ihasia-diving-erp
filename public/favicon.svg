<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Liquid Gradient: Cian/Turquoise to Royal Blue -->
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <!-- Big Water Drop (occupies the entire space, max volume for tab) -->
  <path d="M 256 30 C 256 30, 60 220, 60 340 C 60 440, 148 490, 256 490 C 364 490, 452 440, 452 340 C 452 220, 256 30, 256 30 Z" fill="url(#liquidGrad)" />

  <!-- Gorgeous specular glossy light reflection (top-left) following the contour -->
  <path d="M 120 220 C 100 280, 140 360, 200 380 C 170 360, 130 280, 140 220 C 145 200, 125 205, 120 220 Z" fill="#ffffff" opacity="0.45" />

  <!-- A small sharp specular dot highlight near the top -->
  <circle cx="210" cy="150" r="16" fill="#ffffff" opacity="0.7" />

  <!-- Subtle bottom-right light transmission (caustic highlight) -->
  <path d="M 320 450 C 370 430, 410 390, 420 340 C 400 390, 360 430, 320 450 Z" fill="#ffffff" opacity="0.25" />
</svg>
